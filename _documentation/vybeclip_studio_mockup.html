<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VybeClip | Studio Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05080a; color: #C6C6D0; }

        /* Studio Components */
        .bg-panel { background-color: #0a1115; border: 1px solid rgba(255,255,255,0.05); }
        .text-silver { color: #C6C6D0; }
        .text-muted { color: rgba(198,198,208,0.4); }

        /* Actions */
        .btn-primary { background-color: #B6410F; transition: all 0.2s ease; }
        .btn-primary:hover { background-color: #d1511a; }

        /* Timeline */
        .track-video { background-color: rgba(16, 76, 100, 0.3); border: 1px solid rgba(16, 76, 100, 0.5); }
        .track-audio { background-color: rgba(192, 117, 77, 0.2); border: 1px solid rgba(192, 117, 77, 0.4); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden">

    <header class="h-14 bg-[#0a1115] border-b border-white/5 flex items-center justify-between px-4 z-10">
        <div class="flex items-center gap-3">
            <!-- New Logo Integration -->
            <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8L20 28L28 8" stroke="#104C64" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 20L28 8" stroke="#D59D80" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 18L24 13L20 8" fill="#FFF7F1"/>
            </svg>
            <span class="font-medium text-sm tracking-wide text-white/90">VybeClip_Studio_v01</span>
        </div>

        <div class="flex items-center gap-2">
            <button class="px-4 py-1.5 text-xs font-medium rounded-md text-silver hover:bg-white/5 transition-colors">Import</button>
            <button class="px-4 py-1.5 text-xs rounded-md bg-[#104C64] text-white hover:bg-[#156a8d] flex items-center gap-2 transition-all">
                <i data-lucide="upload" class="w-3.5 h-3.5"></i> Export
            </button>
            <button class="btn-primary px-4 py-1.5 text-xs rounded-md text-white font-semibold flex items-center gap-2 ml-2">
                <i data-lucide="circle-dot" class="w-3.5 h-3.5"></i> Record
            </button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">

        <!-- Sidebar -->
        <aside class="w-64 bg-[#0a1115] border-r border-white/5 p-4 space-y-8">
            <div class="space-y-3">
                <div class="text-[10px] font-bold text-muted uppercase tracking-widest">Workspace</div>
                <div class="space-y-1">
                    <div class="flex items-center gap-2 p-2 rounded-md bg-[#104C64]/20 text-[#D59D80] text-sm"><i data-lucide="film" class="w-4 h-4"></i> Current Recording</div>
                    <div class="flex items-center gap-2 p-2 rounded-md text-silver text-sm hover:bg-white/5"><i data-lucide="folder" class="w-4 h-4"></i> Project Assets</div>
                </div>
            </div>
        </aside>

        <!-- Center Stage -->
        <section class="flex-1 flex flex-col bg-[#05080a] relative">
            <div class="flex-1 flex items-center justify-center p-12">
                <div class="w-full max-w-4xl aspect-video rounded-xl bg-black border border-white/10 shadow-2xl relative overflow-hidden flex items-center justify-center">
                    <div class="text-white/20 text-xs tracking-widest uppercase">Canvas Stage</div>
                </div>
            </div>

            <!-- Timeline -->
            <div class="h-48 bg-[#0a1115] border-t border-white/5 p-4 flex flex-col gap-3">
                <div class="flex items-center justify-between text-[10px] uppercase font-bold text-muted">
                    <span>Timeline</span>
                </div>
                <div class="h-10 relative flex items-center">
                    <div class="absolute left-10 w-64 h-8 track-video rounded-md px-3 flex items-center text-[10px] text-white/70">Source_Clip_01.mp4</div>
                </div>
                <div class="h-10 relative flex items-center">
                    <div class="absolute left-5 w-96 h-8 track-audio rounded-md"></div>
                </div>
            </div>
        </section>

        <!-- Inspector -->
        <aside class="w-72 bg-[#0a1115] border-l border-white/5 p-5 space-y-6">
            <div class="text-sm font-semibold text-white/90">Scene Inspector</div>
            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-muted">Canvas Style</label>
                    <div class="w-full bg-[#08171d] border border-white/10 rounded-md p-2 text-sm text-silver flex justify-between items-center">
                        <span>Clean Demo</span>
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
